<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awakening — Finanzas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#080810">
  <style>
    :root {
      --bg: #080810; --bg2: #0d0d1a; --panel: #11111f;
      --border: #1e1e3a; --accent: #4f6ef7; --gold: #c9a84c;
      --text: #e8e8f0; --text-dim: #6b6b8a;
      --success: #22c55e; --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(79,110,247,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 40px; animation: fadeDown 0.6s ease both; }
    .app-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
    .page-title { font-family: 'Cinzel', serif; font-size: 36px; font-weight: 900; background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    nav.nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; }
    nav.nav a { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; padding: 8px 20px; border: 1px solid transparent; border-radius: 4px; transition: all 0.2s; }
    nav.nav a:hover, nav.nav a.active { color: var(--text); border-color: var(--border); background: var(--panel); }
    .tabs { display: flex; gap: 8px; margin-bottom: 32px; }
    .tab { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 10px 24px; cursor: pointer; transition: all 0.2s; }
    .tab.active, .tab:hover { background: var(--panel); color: var(--text); border-color: var(--accent); }
    .section-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; margin-top: 24px; }
    .hidden { display: none; }

    /* Cards resumen */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }
    .card-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .card-value { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700; }
    .card-value.green { color: var(--success); }
    .card-value.gold { color: var(--gold); }
    .card-value.blue { color: var(--accent); }

    /* Colchón progress */
    .colchon-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 24px; margin-bottom: 16px; }
    .colchon-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .colchon-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; }
    .colchon-pct { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; color: var(--gold); }
    .bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f0c060); border-radius: 4px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0%; }
    .bar-labels { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); }

    /* Formularios */
    .form-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 24px; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; display: block; }
    .form-input, .form-select { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; padding: 10px 14px; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .btn-primary { background: var(--accent); border: none; border-radius: 4px; color: white; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 12px 24px; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-sm { padding: 6px 14px; font-size: 11px; }

    /* Listas */
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; }
    .list-item-name { font-size: 15px; font-weight: 600; }
    .list-item-amount { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); }
    .list-item-right { display: flex; align-items: center; gap: 16px; }
    .btn-del { background: transparent; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; transition: color 0.2s; }
    .btn-del:hover { color: var(--danger); }

    /* Transacciones */
    .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; }
    .tx-concepto { font-size: 15px; font-weight: 600; }
    .tx-cat { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
    .tx-amount { font-family: 'Cinzel', serif; font-size: 16px; }
    .tx-amount.ingreso { color: var(--success); }
    .tx-amount.gasto { color: var(--danger); }

    /* Bolsillos (importes fijos en €) */
    .pct-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .pct-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .pct-label { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }
    .pct-input { background: transparent; border: none; color: var(--accent); font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; width: 80px; text-align: right; }
    .pct-input:focus { outline: none; }
    .pct-sym { color: var(--text-dim); font-size: 16px; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) {
      .container { padding: 20px 16px; }
      .page-title { font-size: 28px; }
      nav.nav { gap: 4px; }
      nav.nav a { font-size: 11px; letter-spacing: 1px; padding: 8px 10px; }
      .tabs { flex-wrap: wrap; }
      .tab { padding: 8px 12px; font-size: 11px; letter-spacing: 1px; }
      .cards-grid { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .pct-grid { grid-template-columns: 1fr; }
      .list-item { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="app-title">Awakening</div>
    <div class="page-title">Finanzas</div>
  </div>

  <nav class="nav">
    <a href="/status">Status</a>
    <a href="/habitos">Hábitos</a>
    <a href="/entrenamiento">Entrenamiento</a>
    <a href="/finanzas" class="active">Finanzas</a>
  </nav>

  <div class="tabs">
    <button class="tab active" onclick="showTab('resumen')">Resumen</button>
    <button class="tab" onclick="showTab('sueldo')">Sueldo</button>
    <button class="tab" onclick="showTab('gastos')">Gastos</button>
  </div>

  <!-- RESUMEN -->
  <div id="tab-resumen">
    <div class="cards-grid" id="cards-resumen"></div>
    <div class="section-title">Colchón de emergencias</div>
    <div class="colchon-card">
      <div class="colchon-header">
        <div class="colchon-title" id="colchon-estado">Colchón</div>
        <div class="colchon-pct" id="colchon-pct">0%</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="colchon-bar"></div></div>
      <div class="bar-labels">
        <span id="colchon-acumulado">0 €</span>
        <span id="colchon-meta">0 €</span>
      </div>
    </div>
    <div class="section-title">ETF Global</div>
    <div id="etf-resumen"></div>
  </div>

  <!-- SUELDO -->
  <div id="tab-sueldo" class="hidden">
    <div id="sueldo-container"></div>
  </div>

  <!-- GASTOS -->
  <div id="tab-gastos" class="hidden">
    <div class="section-title">Gastos fijos</div>
    <div id="gastos-fijos-list"></div>
    <div class="form-panel" style="margin-top:8px">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Concepto</label>
          <input class="form-input" id="inp-fijo-concepto" type="text" placeholder="Casa">
        </div>
        <div class="form-group">
          <label class="form-label">Monto (€)</label>
          <input class="form-input" id="inp-fijo-monto" type="number" placeholder="400">
        </div>
      </div>
      <button class="btn-primary btn-sm" onclick="addGastoFijo()">+ Añadir gasto fijo</button>
    </div>

    <div class="section-title">Gastos personales estimados</div>
    <div id="gastos-personales-list"></div>
    <div class="form-panel" style="margin-top:8px">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input class="form-input" id="inp-personal-nombre" type="text" placeholder="Gimnasio">
        </div>
        <div class="form-group">
          <label class="form-label">Monto estimado (€)</label>
          <input class="form-input" id="inp-personal-monto" type="number" placeholder="35">
        </div>
      </div>
      <button class="btn-primary btn-sm" onclick="addGastoPersonal()">+ Añadir</button>
    </div>
  </div>

  <!-- TRANSACCIONES -->
  
</div>

<script>
  // Cambiar entre pestañas
  function showTab(tab) {
    ["resumen", "sueldo", "gastos"].forEach(t => {
      document.getElementById(`tab-${t}`).classList.add("hidden");
    });
    document.getElementById(`tab-${tab}`).classList.remove("hidden");
    
    document.querySelectorAll(".tab").forEach((el, i) => {
      const tabNames = ["resumen", "sueldo", "gastos"];
      el.classList.toggle("active", tabNames[i] === tab);
    });
    
    if (tab === "resumen") cargarResumen();
    if (tab === "gastos") cargarGastos();
    if (tab === "sueldo") cargarTabSueldo();
  }

  let totalDescuentosGlobal = 0;

  // Cargar pestaña de Sueldo
  async function cargarTabSueldo() {
    const container = document.getElementById("sueldo-container");
    try {
      const [sueldos, fijos, personales] = await Promise.all([
        fetch("/api/finanzas/sueldo").then(r => r.json()),
        fetch("/api/finanzas/gastos-fijos").then(r => r.json()),
        fetch("/api/finanzas/gastos-personales").then(r => r.json())
      ]);

      const mesActual = new Date().toISOString().slice(0, 7);
      const registroMes = sueldos.find(s => s.fecha && s.fecha.startsWith(mesActual));
      
      // Asegurar mapeo correcto de propiedades según tu backend
      const totalFijos = fijos.reduce((a, g) => a + (g.monto || 0), 0);
      const totalPersonales = personales.reduce((a, g) => a + (g.monto_estimado || 0), 0);
      totalDescuentosGlobal = totalFijos + totalPersonales;

      if (registroMes) {
        const porcentajes = JSON.parse(registroMes.porcentajes);
        const libre = registroMes.disponible_real;
        const proximoMes = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 1)
          .toLocaleDateString("es-ES", { day: "numeric", month: "long" });

        container.innerHTML = `
          <div class="form-panel">
            <div style="text-align:center;margin-bottom:24px">
              <div style="font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--text-dim);margin-bottom:8px">SUELDO REGISTRADO</div>
              <div style="font-family:'Cinzel',serif;font-size:40px;font-weight:900;color:var(--accent)">${registroMes.sueldo_neto} €</div>
              <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${registroMes.fecha}</div>
            </div>
            <div class="section-title">Descuentos</div>
            <div class="list-item" style="margin-bottom:6px">
              <div class="list-item-name">Gastos fijos</div>
              <div class="list-item-amount" style="color:var(--danger)">- ${totalFijos} €</div>
            </div>
            <div class="list-item" style="margin-bottom:16px">
              <div class="list-item-name">Gastos personales</div>
              <div class="list-item-amount" style="color:var(--danger)">- ${totalPersonales} €</div>
            </div>
            <div class="list-item" style="border-color:var(--accent);margin-bottom:24px">
              <div class="list-item-name" style="color:var(--accent)">Dinero libre</div>
              <div class="list-item-amount" style="color:var(--accent)">${libre} €</div>
            </div>
            <div class="section-title">Distribución</div>
            ${Object.entries(porcentajes).map(([k, v]) => `
              <div class="list-item" style="margin-bottom:6px">
                <div class="list-item-name">${k}</div>
                <div class="list-item-amount">${Number(v).toFixed(2)} €</div>
              </div>`).join("")}
            <div style="text-align:center;margin-top:24px;color:var(--text-dim);font-size:13px;letter-spacing:2px">
              Próximo registro disponible el ${proximoMes}
            </div>
          </div>
          <div class="section-title">Historial</div>
          <div id="historial-sueldos"></div>`;
      } else {
        const mesNombre = new Date().toLocaleDateString("es-ES", { month: "long", year: "numeric" });
        container.innerHTML = `
          <div class="section-title">Registrar sueldo de ${mesNombre}</div>
          <div class="form-panel">
            <div class="form-group">
              <label class="form-label">Sueldo neto (€)</label>
              <input class="form-input" id="inp-sueldo" type="number" placeholder="1450" oninput="actualizarPreview()">
            </div>
            <div class="section-title" style="margin-top:0">Descuentos automáticos</div>
            <div class="list-item" style="margin-bottom:6px;opacity:0.7">
              <div class="list-item-name">Gastos fijos</div>
              <div class="list-item-amount" style="color:var(--danger)">- ${totalFijos} €</div>
            </div>
            <div class="list-item" style="margin-bottom:16px;opacity:0.7">
              <div class="list-item-name">Gastos personales estimados</div>
              <div class="list-item-amount" style="color:var(--danger)">- ${totalPersonales} €</div>
            </div>
            <div class="list-item" style="border-color:var(--accent);margin-bottom:24px">
              <div class="list-item-name" style="color:var(--accent)">Dinero libre</div>
              <div class="list-item-amount" style="color:var(--accent)" id="preview-libre">— €</div>
            </div>
            <div class="section-title">Distribución del dinero libre (importes fijos en €)</div>
            <div class="pct-grid">
              <div class="pct-item">
                <span class="pct-label">Colchón / Ahorro</span>
                <div style="display:flex;align-items:center;gap:4px">
                  <span class="pct-sym">€</span>
                  <input class="pct-input" id="eur-colchon" type="number" value="446.05" oninput="actualizarPreview()">
                </div>
              </div>
              <div class="pct-item">
                <span class="pct-label">Certificaciones</span>
                <div style="display:flex;align-items:center;gap:4px">
                  <span class="pct-sym">€</span>
                  <input class="pct-input" id="eur-certificaciones" type="number" value="110" oninput="actualizarPreview()">
                </div>
              </div>
              <div class="pct-item">
                <span class="pct-label">Imprevistos</span>
                <div style="display:flex;align-items:center;gap:4px">
                  <span class="pct-sym">€</span>
                  <input class="pct-input" id="eur-imprevistos" type="number" value="100" oninput="actualizarPreview()">
                </div>
              </div>
              <div class="pct-item">
                <span class="pct-label">ETF Global</span>
                <div style="display:flex;align-items:center;gap:4px">
                  <span class="pct-sym">€</span>
                  <input class="pct-input" id="eur-etf" type="number" value="100" oninput="actualizarPreview()">
                </div>
              </div>
            </div>
            <div id="pct-warning" style="color:var(--danger);font-size:13px;margin-top:8px;display:none">Los importes deben sumar el dinero libre</div>
            <div id="distribucion-preview" style="margin-top:16px"></div>
            <button class="btn-primary" id="btn-registrar" style="margin-top:16px;width:100%;opacity:0.5" disabled onclick="registrarSueldo()">Registrar sueldo</button>
          </div>
          <div class="section-title">Historial</div>
          <div id="historial-sueldos"></div>`;
      }
      cargarHistorialSueldos();
    } catch (error) {
      console.error("Error cargando la pestaña de sueldos:", error);
    }
  }

  // Actualizar Preview del Sueldo Libre y Distribución
  function actualizarPreview() {
    const sueldo = parseFloat(document.getElementById("inp-sueldo")?.value) || 0;
    const libre = sueldo - totalDescuentosGlobal;

    const previewLibre = document.getElementById("preview-libre");
    if (previewLibre) previewLibre.textContent = libre > 0 ? `${libre.toFixed(2)} €` : "— €";

    const colchon = parseFloat(document.getElementById("eur-colchon")?.value) || 0;
    const certificaciones = parseFloat(document.getElementById("eur-certificaciones")?.value) || 0;
    const imprevistos = parseFloat(document.getElementById("eur-imprevistos")?.value) || 0;
    const etf = parseFloat(document.getElementById("eur-etf")?.value) || 0;
    const suma = colchon + certificaciones + imprevistos + etf;

    const warning = document.getElementById("pct-warning");
    const btn = document.getElementById("btn-registrar");
    const preview = document.getElementById("distribucion-preview");

    if (!warning || !btn || !preview) return;

    if (sueldo > 0 && Math.round(suma * 100) !== Math.round(libre * 100)) {
      warning.style.display = "block";
      warning.textContent = `Los importes suman ${suma.toFixed(2)} € pero el dinero libre es ${libre.toFixed(2)} €`;
      btn.disabled = true;
      btn.style.opacity = "0.5";
      preview.innerHTML = "";
      return;
    }

    warning.style.display = "none";
    if (sueldo > 0 && libre >= 0) {
      btn.disabled = false;
      btn.style.opacity = "1";
      preview.innerHTML = `
        <div class="section-title">Distribución confirmada</div>
        <div class="list-item" style="margin-bottom:6px"><div class="list-item-name">Colchón / Ahorro</div><div class="list-item-amount">${colchon.toFixed(2)} €</div></div>
        <div class="list-item" style="margin-bottom:6px"><div class="list-item-name">Certificaciones</div><div class="list-item-amount">${certificaciones.toFixed(2)} €</div></div>
        <div class="list-item" style="margin-bottom:6px"><div class="list-item-name">Imprevistos</div><div class="list-item-amount">${imprevistos.toFixed(2)} €</div></div>
        <div class="list-item" style="margin-bottom:6px"><div class="list-item-name">ETF Global</div><div class="list-item-amount">${etf.toFixed(2)} €</div></div>
      `;
    } else {
      btn.disabled = true;
      btn.style.opacity = "0.5";
      preview.innerHTML = "";
    }
  }

  // Enviar sueldo al backend
  async function registrarSueldo() {
    const sueldo_neto = parseFloat(document.getElementById("inp-sueldo").value);
    const porcentajes = {
      "Colchón / Ahorro": parseFloat(document.getElementById("eur-colchon").value),
      "Certificaciones": parseFloat(document.getElementById("eur-certificaciones").value),
      "Imprevistos": parseFloat(document.getElementById("eur-imprevistos").value),
      "ETF Global": parseFloat(document.getElementById("eur-etf").value)
    };

    const res = await fetch("/api/finanzas/sueldo", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sueldo_neto, porcentajes })
    });

    if (res.ok) {
      cargarTabSueldo();
    } else {
      alert("Error al registrar el sueldo");
    }
  }

  // Cargar Historial
  async function cargarHistorialSueldos() {
    const div = document.getElementById("historial-sueldos");
    if (!div) return;
    const historial = await fetch("/api/finanzas/sueldo").then(r => r.json());
    div.innerHTML = historial.map(h => `
      <div class="list-item">
        <div><strong>${h.fecha}</strong> - Sueldo: ${h.sueldo_neto}€</div>
        <div class="list-item-amount" style="font-size:14px; color:var(--text-dim)">Libre: ${h.disponible_real}€</div>
      </div>
    `).join("");
  }

  // GESTIÓN DE GASTOS
  async function cargarGastos() {
    const [fijos, personales] = await Promise.all([
      fetch("/api/finanzas/gastos-fijos").then(r => r.json()),
      fetch("/api/finanzas/gastos-personales").then(r => r.json())
    ]);

    // Render Fijos
    document.getElementById("gastos-fijos-list").innerHTML = fijos.map(g => `
      <div class="list-item">
        <span class="list-item-name">${g.concepto}</span>
        <div class="list-item-right">
          <span class="list-item-amount">${g.monto} €</span>
          <button class="btn-del" onclick="eliminarGastoFijo(${g.id})">×</button>
        </div>
      </div>`).join("");

    // Render Personales
    document.getElementById("gastos-personales-list").innerHTML = personales.map(g => `
      <div class="list-item">
        <span class="list-item-name">${g.nombre}</span>
        <div class="list-item-right">
          <span class="list-item-amount">${g.monto_estimado} €</span>
          <button class="btn-del" onclick="eliminarGastoPersonal(${g.id})">×</button>
        </div>
      </div>`).join("");
  }

  async function addGastoFijo() {
    const concepto = document.getElementById("inp-fijo-concepto").value;
    const monto = parseFloat(document.getElementById("inp-fijo-monto").value);
    if(!concepto || !monto) return alert("Rellena todos los campos");

    await fetch("/api/finanzas/gastos-fijos", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ concepto, monto })
    });
    cargarGastos();
  }

  async function addGastoPersonal() {
    const nombre = document.getElementById("inp-personal-nombre").value;
    const monto_estimado = parseFloat(document.getElementById("inp-personal-monto").value);
    if(!nombre || !monto_estimado) return alert("Rellena todos los campos");

    await fetch("/api/finanzas/gastos-personales", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nombre, monto_estimado })
    });
    cargarGastos();
  }

  async function eliminarGastoFijo(id) {
    await fetch(`/api/finanzas/gastos-fijos/${id}`, { method: "DELETE" });
    cargarGastos();
  }

  async function eliminarGastoPersonal(id) {
    await fetch(`/api/finanzas/gastos-personales/${id}`, { method: "DELETE" });
    cargarGastos();
  }

  // Funciones Dummy para el Resumen (ajústalas según tu API del dashboard)
  async function cargarResumen() {
    console.log("Cargando resumen...");
  }

  // Inicialización por defecto
  window.onload = () => {
    showTab('resumen');
  };
</script>
