<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awakening — Finanzas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#080810">
  <style>
    :root {
      --bg: #080810; --bg2: #0d0d1a; --panel: #11111f;
      --border: #1e1e3a; --accent: #4f6ef7; --gold: #c9a84c;
      --text: #e8e8f0; --text-dim: #6b6b8a;
      --success: #22c55e; --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(79,110,247,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 40px; animation: fadeDown 0.6s ease both; }
    .app-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
    .page-title { font-family: 'Cinzel', serif; font-size: 36px; font-weight: 900; background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    nav.nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; }
    nav.nav a { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; padding: 8px 20px; border: 1px solid transparent; border-radius: 4px; transition: all 0.2s; }
    nav.nav a:hover, nav.nav a.active { color: var(--text); border-color: var(--border); background: var(--panel); }
    .tabs { display: flex; gap: 8px; margin-bottom: 32px; }
    .tab { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 10px 24px; cursor: pointer; transition: all 0.2s; }
    .tab.active, .tab:hover { background: var(--panel); color: var(--text); border-color: var(--accent); }
    .section-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; margin-top: 24px; }
    .hidden { display: none; }

    /* Cards resumen */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }
    .card-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .card-value { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700; }
    .card-value.green { color: var(--success); }
    .card-value.gold { color: var(--gold); }
    .card-value.blue { color: var(--accent); }

    /* Colchón progress */
    .colchon-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 24px; margin-bottom: 16px; }
    .colchon-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .colchon-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; }
    .colchon-pct { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; color: var(--gold); }
    .bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f0c060); border-radius: 4px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0%; }
    .bar-labels { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); }

    /* Formularios */
    .form-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 24px; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; display: block; }
    .form-input, .form-select { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; padding: 10px 14px; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .btn-primary { background: var(--accent); border: none; border-radius: 4px; color: white; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 12px 24px; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-sm { padding: 6px 14px; font-size: 11px; }

    /* Listas */
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; }
    .list-item-name { font-size: 15px; font-weight: 600; }
    .list-item-amount { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); }
    .list-item-right { display: flex; align-items: center; gap: 16px; }
    .btn-del { background: transparent; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; transition: color 0.2s; }
    .btn-del:hover { color: var(--danger); }

    /* Transacciones */
    .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; }
    .tx-concepto { font-size: 15px; font-weight: 600; }
    .tx-cat { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
    .tx-amount { font-family: 'Cinzel', serif; font-size: 16px; }
    .tx-amount.ingreso { color: var(--success); }
    .tx-amount.gasto { color: var(--danger); }

    /* Porcentajes */
    .pct-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .pct-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .pct-label { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }
    .pct-input { background: transparent; border: none; color: var(--accent); font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; width: 60px; text-align: right; }
    .pct-input:focus { outline: none; }
    .pct-sym { color: var(--text-dim); font-size: 16px; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="app-title">Awakening</div>
    <div class="page-title">Finanzas</div>
  </div>

  <nav class="nav">
    <a href="/status">Status</a>
    <a href="/habitos">Hábitos</a>
    <a href="/entrenamiento">Entrenamiento</a>
    <a href="/finanzas" class="active">Finanzas</a>
  </nav>

  <div class="tabs">
    <button class="tab active" onclick="showTab('resumen')">Resumen</button>
    <button class="tab" onclick="showTab('sueldo')">Sueldo</button>
    <button class="tab" onclick="showTab('gastos')">Gastos</button>
    <button class="tab" onclick="showTab('transacciones')">Transacciones</button>
  </div>

  <!-- RESUMEN -->
  <div id="tab-resumen">
    <div class="cards-grid" id="cards-resumen"></div>
    <div class="section-title">Colchón de emergencias</div>
    <div class="colchon-card">
      <div class="colchon-header">
        <div class="colchon-title" id="colchon-estado">Colchón</div>
        <div class="colchon-pct" id="colchon-pct">0%</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="colchon-bar"></div></div>
      <div class="bar-labels">
        <span id="colchon-acumulado">0 €</span>
        <span id="colchon-meta">0 €</span>
      </div>
    </div>
    <div class="section-title">ETF Global</div>
    <div id="etf-resumen"></div>
  </div>

  <!-- SUELDO -->
  <div id="tab-sueldo" class="hidden">
    <div class="section-title">Registrar sueldo del mes</div>
    <div class="form-panel">
      <div class="form-group">
        <label class="form-label">Sueldo neto (€)</label>
        <input class="form-input" id="inp-sueldo" type="number" placeholder="1450">
      </div>
      <div class="section-title" style="margin-top:0">Distribución (%)</div>
      <div class="pct-grid">
        <div class="pct-item">
          <span class="pct-label">Gastos personales</span>
          <div style="display:flex;align-items:center;gap:4px">
            <input class="pct-input" id="pct-gastos" type="number" value="22">
            <span class="pct-sym">%</span>
          </div>
        </div>
        <div class="pct-item">
          <span class="pct-label">Colchón / Ahorro</span>
          <div style="display:flex;align-items:center;gap:4px">
            <input class="pct-input" id="pct-colchon" type="number" value="43">
            <span class="pct-sym">%</span>
          </div>
        </div>
        <div class="pct-item">
          <span class="pct-label">ETF Global</span>
          <div style="display:flex;align-items:center;gap:4px">
            <input class="pct-input" id="pct-etf" type="number" value="10">
            <span class="pct-sym">%</span>
          </div>
        </div>
        <div class="pct-item">
          <span class="pct-label">Imprevistos</span>
          <div style="display:flex;align-items:center;gap:4px">
            <input class="pct-input" id="pct-imprevistos" type="number" value="5">
            <span class="pct-sym">%</span>
          </div>
        </div>
      </div>
      <div id="distribucion-preview" style="margin-top:16px"></div>
      <button class="btn-primary" style="margin-top:16px;width:100%" onclick="registrarSueldo()">Registrar sueldo</button>
    </div>
    <div class="section-title">Historial</div>
    <div id="historial-sueldos"></div>
  </div>

  <!-- GASTOS -->
  <div id="tab-gastos" class="hidden">
    <div class="section-title">Gastos fijos</div>
    <div id="gastos-fijos-list"></div>
    <div class="form-panel" style="margin-top:8px">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Concepto</label>
          <input class="form-input" id="inp-fijo-concepto" type="text" placeholder="Casa">
        </div>
        <div class="form-group">
          <label class="form-label">Monto (€)</label>
          <input class="form-input" id="inp-fijo-monto" type="number" placeholder="400">
        </div>
      </div>
      <button class="btn-primary btn-sm" onclick="addGastoFijo()">+ Añadir gasto fijo</button>
    </div>

    <div class="section-title">Gastos personales estimados</div>
    <div id="gastos-personales-list"></div>
    <div class="form-panel" style="margin-top:8px">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select class="form-select" id="sel-cat-personal"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Monto estimado (€)</label>
          <input class="form-input" id="inp-personal-monto" type="number" placeholder="35">
        </div>
      </div>
      <button class="btn-primary btn-sm" onclick="addGastoPersonal()">+ Añadir</button>
    </div>
  </div>

  <!-- TRANSACCIONES -->
  <div id="tab-transacciones" class="hidden">
    <div class="form-panel">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Concepto</label>
          <input class="form-input" id="inp-tx-concepto" type="text" placeholder="Compra supermercado">
        </div>
        <div class="form-group">
          <label class="form-label">Monto (€)</label>
          <input class="form-input" id="inp-tx-monto" type="number" placeholder="45">
        </div>
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <input class="form-input" id="inp-tx-cat" type="text" placeholder="Alimentación">
        </div>
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select class="form-select" id="sel-tx-tipo">
            <option value="gasto">Gasto</option>
            <option value="ingreso">Ingreso</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" style="width:100%" onclick="addTransaccion()">Registrar transacción</button>
    </div>
    <div class="section-title">Últimas transacciones</div>
    <div id="tx-list"></div>
  </div>
</div>

<script>
  function showTab(tab) {
    ["resumen","sueldo","gastos","transacciones"].forEach(t => {
      document.getElementById(`tab-${t}`).classList.add("hidden");
    });
    document.getElementById(`tab-${tab}`).classList.remove("hidden");
    document.querySelectorAll(".tab").forEach((el, i) => {
      el.classList.toggle("active", ["resumen","sueldo","gastos","transacciones"][i] === tab);
    });
    if (tab === "resumen") cargarResumen();
    if (tab === "gastos") cargarGastos();
    if (tab === "transacciones") cargarTransacciones();
    if (tab === "sueldo") cargarHistorialSueldos();
  }

  async function cargarResumen() {
    const [colchon, etf, sueldos] = await Promise.all([
      fetch("/api/finanzas/colchon").then(r => r.ok ? r.json() : null),
      fetch("/api/finanzas/etf").then(r => r.json()),
      fetch("/api/finanzas/sueldo").then(r => r.json())
    ]);

    // Cards
    const cards = document.getElementById("cards-resumen");
    const ultimoSueldo = sueldos[0];
    cards.innerHTML = `
      <div class="card">
        <div class="card-label">Último sueldo neto</div>
        <div class="card-value blue">${ultimoSueldo ? ultimoSueldo.sueldo_neto.toFixed(0) + " €" : "—"}</div>
      </div>
      <div class="card">
        <div class="card-label">Disponible real</div>
        <div class="card-value green">${ultimoSueldo ? ultimoSueldo.disponible_real.toFixed(0) + " €" : "—"}</div>
      </div>
      <div class="card">
        <div class="card-label">ETF acumulado</div>
        <div class="card-value gold">${etf.length > 0 ? etf[0].total_acumulado.toFixed(0) + " €" : "0 €"}</div>
      </div>`;

    // Colchón
    if (colchon) {
      const pct = Math.min((colchon.acumulado / colchon.meta_monto) * 100, 100).toFixed(1);
      document.getElementById("colchon-estado").textContent = colchon.completado ? "✓ Colchón completado" : "Colchón en progreso";
      document.getElementById("colchon-pct").textContent = pct + "%";
      document.getElementById("colchon-acumulado").textContent = colchon.acumulado.toFixed(0) + " €";
      document.getElementById("colchon-meta").textContent = colchon.meta_monto.toFixed(0) + " €";
      setTimeout(() => {
        document.getElementById("colchon-bar").style.width = pct + "%";
      }, 100);
    }

    // ETF
    const etfEl = document.getElementById("etf-resumen");
    if (etf.length === 0) {
      etfEl.innerHTML = '<div style="color:var(--text-dim);font-size:14px">Sin aportaciones registradas</div>';
    } else {
      etfEl.innerHTML = etf.slice(0,3).map(e => `
        <div class="list-item">
          <div class="list-item-name">${e.fecha}</div>
          <div class="list-item-right">
            <div style="color:var(--text-dim);font-size:13px">+${e.aportacion_mensual} €</div>
            <div class="list-item-amount">${e.total_acumulado.toFixed(0)} € total</div>
          </div>
        </div>`).join("");
    }
  }

  async function registrarSueldo() {
    const sueldo = parseFloat(document.getElementById("inp-sueldo").value);
    if (!sueldo) return;
    const porcentajes = {
      gastos_personales: parseFloat(document.getElementById("pct-gastos").value),
      colchon:           parseFloat(document.getElementById("pct-colchon").value),
      etf:               parseFloat(document.getElementById("pct-etf").value),
      imprevistos:       parseFloat(document.getElementById("pct-imprevistos").value),
    };
    const res = await fetch("/api/finanzas/sueldo", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sueldo_neto: sueldo, porcentajes })
    });
    const data = await res.json();

    // Preview distribución
    const preview = document.getElementById("distribucion-preview");
    preview.innerHTML = `
      <div class="section-title">Distribución calculada</div>
      ${Object.entries(data.distribucion).map(([k,v]) => `
        <div class="list-item" style="margin-bottom:6px">
          <div class="list-item-name">${k}</div>
          <div class="list-item-amount">${v} €</div>
        </div>`).join("")}
      <div class="list-item" style="margin-top:4px;border-color:var(--accent)">
        <div class="list-item-name" style="color:var(--text-dim)">Disponible real</div>
        <div class="list-item-amount" style="color:var(--accent)">${data.disponible_real} €</div>
      </div>`;

    // Registrar aportación ETF automáticamente
    const etfMonto = data.distribucion.etf;
    if (etfMonto > 0) {
      await fetch("/api/finanzas/etf", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ aportacion: etfMonto })
      });
    }

    // Actualizar colchón
    const colchonMonto = data.distribucion.colchon;
    if (colchonMonto > 0) {
      await fetch("/api/finanzas/colchon/actualizar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ monto: colchonMonto })
      });
    }

    // XP por registrar sueldo
    await fetch("/api/usuario/xp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ stat_tipo: "Riqueza", xp: 30, motivo: "Sueldo registrado" })
    });

    cargarHistorialSueldos();
  }

  async function cargarHistorialSueldos() {
    const res = await fetch("/api/finanzas/sueldo");
    const sueldos = await res.json();
    const el = document.getElementById("historial-sueldos");
    if (!el) return;
    el.innerHTML = sueldos.map(s => `
      <div class="list-item">
        <div>
          <div class="list-item-name">${s.fecha}</div>
          <div style="font-size:12px;color:var(--text-dim)">Disponible: ${s.disponible_real.toFixed(0)} €</div>
        </div>
        <div class="list-item-amount">${s.sueldo_neto.toFixed(0)} €</div>
      </div>`).join("") || '<div style="color:var(--text-dim);font-size:14px">Sin registros</div>';
  }

  async function cargarGastos() {
    const [fijos, personales, cats] = await Promise.all([
      fetch("/api/finanzas/gastos-fijos").then(r => r.json()),
      fetch("/api/finanzas/gastos-personales").then(r => r.json()),
      fetch("/api/finanzas/gastos-personales/categorias").then(r => r.json())
    ]);

    document.getElementById("gastos-fijos-list").innerHTML = fijos.map(g => `
      <div class="list-item">
        <div class="list-item-name">${g.concepto}</div>
        <div class="list-item-right">
          <div class="list-item-amount">${g.monto} €/mes</div>
          <button class="btn-del" onclick="delGastoFijo(${g.id})">×</button>
        </div>
      </div>`).join("") || '<div style="color:var(--text-dim);font-size:14px;margin-bottom:8px">Sin gastos fijos</div>';

    document.getElementById("gastos-personales-list").innerHTML = personales.map(g => `
      <div class="list-item">
        <div class="list-item-name">${g.nombre}</div>
        <div class="list-item-right">
          <div class="list-item-amount">${g.monto_estimado} €/mes</div>
          <button class="btn-del" onclick="delGastoPersonal(${g.id})">×</button>
        </div>
      </div>`).join("") || '<div style="color:var(--text-dim);font-size:14px;margin-bottom:8px">Sin gastos personales</div>';

    const sel = document.getElementById("sel-cat-personal");
    sel.innerHTML = cats.map(c => `<option value="${c.id}">${c.nombre}</option>`).join("");
  }

  async function addGastoFijo() {
    const concepto = document.getElementById("inp-fijo-concepto").value.trim();
    const monto = parseFloat(document.getElementById("inp-fijo-monto").value);
    if (!concepto || !monto) return;
    await fetch("/api/finanzas/gastos-fijos", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ concepto, monto })
    });
    document.getElementById("inp-fijo-concepto").value = "";
    document.getElementById("inp-fijo-monto").value = "";
    cargarGastos();
  }

  async function delGastoFijo(id) {
    await fetch(`/api/finanzas/gastos-fijos/${id}`, { method: "DELETE" });
    cargarGastos();
  }

  async function addGastoPersonal() {
    const cat_id = parseInt(document.getElementById("sel-cat-personal").value);
    const monto = parseFloat(document.getElementById("inp-personal-monto").value);
    if (!monto) return;
    await fetch("/api/finanzas/gastos-personales", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ categoria_id: cat_id, monto_estimado: monto })
    });
    document.getElementById("inp-personal-monto").value = "";
    cargarGastos();
  }

  async function delGastoPersonal(id) {
    await fetch(`/api/finanzas/gastos-personales/${id}`, { method: "DELETE" });
    cargarGastos();
  }

  async function cargarTransacciones() {
    const res = await fetch("/api/finanzas/transacciones");
    const txs = await res.json();
    document.getElementById("tx-list").innerHTML = txs.map(t => `
      <div class="tx-item">
        <div>
          <div class="tx-concepto">${t.concepto || t.categoria}</div>
          <div class="tx-cat">${t.categoria} · ${t.fecha}</div>
        </div>
        <div class="tx-amount ${t.tipo}">${t.tipo === "ingreso" ? "+" : "-"}${t.monto} €</div>
      </div>`).join("") || '<div style="color:var(--text-dim);font-size:14px">Sin transacciones</div>';
  }

  async function addTransaccion() {
    const concepto = document.getElementById("inp-tx-concepto").value.trim();
    const monto = parseFloat(document.getElementById("inp-tx-monto").value);
    const categoria = document.getElementById("inp-tx-cat").value.trim();
    const tipo = document.getElementById("sel-tx-tipo").value;
    if (!monto || !categoria) return;
    await fetch("/api/finanzas/transacciones", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ concepto, monto, categoria, tipo })
    });
    document.getElementById("inp-tx-concepto").value = "";
    document.getElementById("inp-tx-monto").value = "";
    document.getElementById("inp-tx-cat").value = "";
    cargarTransacciones();
  }

  cargarResumen();
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js");
  }
</script>
</body>
</html>
