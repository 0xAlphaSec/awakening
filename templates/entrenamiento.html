<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awakening — Entrenamiento</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#080810">
  <style>
    :root {
      --bg: #080810; --bg2: #0d0d1a; --panel: #11111f;
      --border: #1e1e3a; --accent: #4f6ef7; --gold: #c9a84c;
      --text: #e8e8f0; --text-dim: #6b6b8a;
      --fuerza: #ef4444; --resistencia: #f97316;
      --success: #22c55e; --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(79,110,247,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 40px; animation: fadeDown 0.6s ease both; }
    .app-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
    .page-title { font-family: 'Cinzel', serif; font-size: 36px; font-weight: 900; background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    nav.nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 40px; }
    nav.nav a { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; padding: 8px 20px; border: 1px solid transparent; border-radius: 4px; transition: all 0.2s; }
    nav.nav a:hover, nav.nav a.active { color: var(--text); border-color: var(--border); background: var(--panel); }
    .section-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; margin-top: 32px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 32px; }
    .tab { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 10px 24px; cursor: pointer; transition: all 0.2s; }
    .tab.active, .tab:hover { background: var(--panel); color: var(--text); border-color: var(--accent); }
    .hidden { display: none; }

    /* Rutina del día */
    .dia-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 24px; margin-bottom: 16px; }
    .dia-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .dia-nombre { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; }
    .dia-tipo { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    .ejercicio-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .ejercicio-item:last-child { border-bottom: none; }
    .ejercicio-bullet { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .ejercicio-nombre { flex: 1; font-size: 15px; font-weight: 600; }
    .ejercicio-series { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }

    /* Sesión activa */
    .sesion-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 24px; }
    .sesion-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sesion-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; }
    .sesion-timer { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; color: var(--accent); }
    .sets-list { margin-bottom: 20px; }
    .set-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .set-row:last-child { border-bottom: none; }
    .set-num { width: 24px; height: 24px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .set-ejercicio { flex: 1; font-weight: 600; }
    .set-detalle { color: var(--text-dim); font-size: 13px; }
    .add-set-form { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .form-input, .form-select { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 14px; padding: 8px 12px; transition: border-color 0.2s; width: 100%; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; display: block; }
    .form-group { margin-bottom: 12px; }
    .btn-primary { background: var(--accent); border: none; border-radius: 4px; color: white; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 10px 20px; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger { background: transparent; border: 1px solid #ef4444; border-radius: 4px; color: #ef4444; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 10px 20px; cursor: pointer; transition: all 0.2s; }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 10px 20px; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-add { background: transparent; border: 1px dashed var(--border); border-radius: 6px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; padding: 14px 20px; width: 100%; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .btn-add:hover { border-color: var(--accent); color: var(--accent); }
    .no-sesion { text-align: center; padding: 40px; }
    .no-sesion p { color: var(--text-dim); margin-bottom: 20px; font-size: 15px; letter-spacing: 1px; }

    /* Historial */
    .historial-item { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .historial-fecha { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); letter-spacing: 1px; }
    .historial-rutina { font-size: 15px; font-weight: 600; }
    .historial-duracion { font-size: 13px; color: var(--text-dim); }

    /* Rutinas */
    .rutina-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 20px; margin-bottom: 12px; }
    .rutina-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .rutina-card-nombre { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; }
    .rutina-card-dia { font-size: 12px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .rutina-card-actions { display: flex; gap: 8px; }
    .btn-icon { background: transparent; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; }
    .btn-icon:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
    .rutina-ejercicios-list { border-top: 1px solid var(--border); padding-top: 12px; }
    .rutina-ejercicio-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .rutina-ejercicio-row:last-child { border-bottom: none; }
    .rutina-ejercicio-nombre { flex: 1; font-weight: 600; }
    .rutina-ejercicio-detalle { font-size: 12px; color: var(--text-dim); }
    .rutina-ejercicio-tipo { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 32px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: fadeUp 0.3s ease both; }
    .modal-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; margin-bottom: 24px; letter-spacing: 2px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 24px; }
    .tipo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 6px; }
    .tipo-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 10px 8px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .tipo-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .container { padding: 20px 16px; }
      .page-title { font-size: 28px; }
      nav.nav { gap: 4px; }
      nav.nav a { font-size: 11px; letter-spacing: 1px; padding: 8px 10px; }
      .tabs { gap: 4px; flex-wrap: wrap; }
      .tab { padding: 8px 12px; font-size: 11px; letter-spacing: 1px; }
      .add-set-form { grid-template-columns: 1fr 1fr; }
      .btn-row { flex-direction: column; }
      .btn-row button { width: 100%; }
      .sesion-timer { font-size: 18px; }
      .tipo-grid { grid-template-columns: 1fr; }
      .rutina-card-header { flex-direction: column; align-items: flex-start; gap: 10px; }
    }

    .dia-btn { 
      width: 36px; 
      height: 36px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      background: var(--bg2); 
      border: 1px solid var(--border); 
      border-radius: 4px; 
      color: var(--text-dim); 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 12px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    .dia-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="app-title">Awakening</div>
    <div class="page-title">Entrenamiento</div>
  </div>

  <nav class="nav">
    <a href="/status">Status</a>
    <a href="/habitos">Hábitos</a>
    <a href="/entrenamiento" class="active">Entrenamiento</a>
    <a href="/finanzas">Finanzas</a>
  </nav>

  <div class="tabs">
    <button class="tab active" onclick="showTab('hoy')">Hoy</button>
    <button class="tab" onclick="showTab('rutinas')">Rutinas</button>
    <button class="tab" onclick="showTab('sesion')">Sesión</button>
    <button class="tab" onclick="showTab('historial')">Historial</button>
  </div>

  <!-- TAB HOY -->
  <div id="tab-hoy">
    <div class="section-title">Rutina de hoy</div>
    <div id="rutina-hoy"></div>
  </div>

  <!-- TAB RUTINAS -->
  <div id="tab-rutinas" class="hidden">
    <div id="rutinas-list"></div>
    <button class="btn-add" onclick="abrirModalRutina()">+ Nueva rutina</button>
  </div>

  <!-- TAB SESIÓN -->
  <div id="tab-sesion" class="hidden">
    <div id="sesion-container"></div>
  </div>

  <!-- TAB HISTORIAL -->
  <div id="tab-historial" class="hidden">
    <div class="section-title">Sesiones anteriores</div>
    <div id="historial-list"></div>
  </div>
</div>

<!-- Modal nueva rutina -->
<div class="modal-overlay" id="modal-rutina">
  <div class="modal">
    <div class="modal-title">Nueva Rutina</div>
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input class="form-input" id="inp-rutina-nombre" type="text" placeholder="Ej: Push Day">
    </div>
    <div class="form-group">
      <label class="form-label">Días de la semana</label>
      <div style="display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;">
        <div class="dia-btn" data-dia="Lunes">L</div>
        <div class="dia-btn" data-dia="Martes">M</div>
        <div class="dia-btn" data-dia="Miercoles">X</div>
        <div class="dia-btn" data-dia="Jueves">J</div>
        <div class="dia-btn" data-dia="Viernes">V</div>
        <div class="dia-btn" data-dia="Sabado">S</div>
        <div class="dia-btn" data-dia="Domingo">D</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Descripción (opcional)</label>
      <input class="form-input" id="inp-rutina-desc" type="text" placeholder="Ej: Pecho, hombros y tríceps">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarModal('modal-rutina')">Cancelar</button>
      <button class="btn-primary" onclick="guardarRutina()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal añadir ejercicio a rutina -->
<div class="modal-overlay" id="modal-ejercicio-rutina">
  <div class="modal">
    <div class="modal-title">Agregar Ejercicio</div>
    <input type="hidden" id="inp-rutina-id">
    <div class="form-group">
      <label class="form-label">Ejercicio</label>
      <select class="form-select" id="sel-ejercicio-rutina">
        <option value="__nuevo">+ Crear nuevo ejercicio</option>
      </select>
    </div>
    <div id="nuevo-ejercicio-fields" class="hidden">
      <div class="form-group">
        <label class="form-label">Nombre del ejercicio</label>
        <input class="form-input" id="inp-ej-nombre" type="text" placeholder="Ej: Press banca">
      </div>
      <div class="form-group">
        <label class="form-label">Grupo muscular</label>
        <input class="form-input" id="inp-ej-musculo" type="text" placeholder="Ej: Pecho">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de ejercicio</label>
        <div class="tipo-grid">
          <div class="tipo-btn" data-tipo="tiempo" onclick="selTipo(this)">Tiempo</div>
          <div class="tipo-btn" data-tipo="peso" onclick="selTipo(this)">Peso</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Equipo por defecto</label>
        <select class="form-select" id="inp-ej-equipo">
          <option value="Peso corporal">Peso corporal</option>
          <option value="Mancuernas">Mancuernas</option>
          <option value="Barra">Barra</option>
          <option value="Maquina">Máquina</option>
          <option value="Bandas">Bandas</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Series</label>
      <input class="form-input" id="inp-ej-series" type="number" min="1" value="3">
    </div>
    <div class="form-group" id="field-reps">
      <label class="form-label">Reps objetivo</label>
      <input class="form-input" id="inp-ej-reps" type="number" min="1" value="10">
    </div>
    <div class="form-group hidden" id="field-tiempo">
      <label class="form-label">Duración (segundos)</label>
      <input class="form-input" id="inp-ej-tiempo" type="number" min="1" value="30">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarModal('modal-ejercicio-rutina')">Cancelar</button>
      <button class="btn-primary" onclick="guardarEjercicioRutina()">Añadir</button>
    </div>
  </div>
</div>

<!-- Modal sesión libre -->
<div class="modal-overlay" id="modal-sesion-libre">
  <div class="modal">
    <div class="modal-title">Nueva Sesión</div>
    <div class="form-group">
      <label class="form-label">Rutina (opcional)</label>
      <select class="form-select" id="sel-rutina-sesion">
        <option value="">Sesión libre</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarModal('modal-sesion-libre')">Cancelar</button>
      <button class="btn-primary" onclick="confirmarIniciarSesion()">Iniciar</button>
    </div>
  </div>
</div>

<script>
  const DIAS = ["Domingo","Lunes","Martes","Miercoles","Jueves","Viernes","Sabado"];
  const diaHoy = DIAS[new Date().getDay()];
  let sesionActiva = null;
  let timerInterval = null;
  let segundos = 0;
  let ejerciciosCat = [];
  let rutinasCat = [];
  let tipoEjercicioSeleccionado = 'repeticiones';

  function showTab(tab) {
    ["hoy","rutinas","sesion","historial"].forEach(t => {
      document.getElementById(`tab-${t}`).classList.add("hidden");
    });
    document.getElementById(`tab-${tab}`).classList.remove("hidden");
    document.querySelectorAll(".tab").forEach((el, i) => {
      el.classList.toggle("active", ["hoy","rutinas","sesion","historial"][i] === tab);
    });
    if (tab === "historial") cargarHistorial();
    if (tab === "sesion") renderSesion();
    if (tab === "rutinas") cargarRutinas();
  }

  function cerrarModal(id) {
    document.getElementById(id).classList.remove("open");
  }

  // ── RUTINAS ──────────────────────────────────────────

  async function cargarRutinas() {
    const res = await fetch("/api/ejercicios/rutinas");
    rutinasCat = await res.json();
    const list = document.getElementById("rutinas-list");

    if (rutinasCat.length === 0) {
      list.innerHTML = '<div style="color:var(--text-dim);font-size:14px;margin-bottom:16px">Sin rutinas creadas aún</div>';
      return;
    }

    list.innerHTML = rutinasCat.map(r => `
      <div class="rutina-card" id="rutina-card-${r.id}">
        <div class="rutina-card-header">
          <div>
            <div class="rutina-card-nombre">${r.nombre}</div>
            <div class="rutina-card-dia">${r.dias_semana ? JSON.parse(r.dias_semana).join(" · ") : r.dia_semana}${r.descripcion ? ' · ' + r.descripcion : ''}</div>
          </div>
          <div class="rutina-card-actions">
            <button class="btn-secondary" style="padding:6px 14px;font-size:11px" onclick="abrirModalEjercicioRutina(${r.id})">+ Ejercicio</button>
            <button class="btn-icon" onclick="eliminarRutina(${r.id})">✕</button>
          </div>
        </div>
        <div class="rutina-ejercicios-list" id="ejs-rutina-${r.id}">
          <div style="color:var(--text-dim);font-size:13px">Cargando...</div>
        </div>
      </div>
    `).join("");

    rutinasCat.forEach(r => cargarEjerciciosRutina(r.id));
  }

  async function cargarEjerciciosRutina(rutina_id) {
    const res = await fetch(`/api/ejercicios/rutinas/${rutina_id}/ejercicios`);
    const data = await res.json();
    const container = document.getElementById(`ejs-rutina-${rutina_id}`);
    if (!container) return;

    if (!data.ejercicios || data.ejercicios.length === 0) {
      container.innerHTML = '<div style="color:var(--text-dim);font-size:13px">Sin ejercicios añadidos</div>';
      return;
    }

    container.innerHTML = data.ejercicios.map(e => {
      let detalle = '';
      if (e.tipo === 'tiempo') {
        detalle = `${e.series || '—'} series × ${e.reps_objetivo || '—'}s`;
      } else {
        detalle = `${e.series || '—'} series × ${e.reps_objetivo || '—'} reps`;
      }
      return `
        <div class="rutina-ejercicio-row">
          <div class="ejercicio-bullet" style="width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0"></div>
          <div class="rutina-ejercicio-nombre">${e.nombre}</div>
          <div class="rutina-ejercicio-detalle">${detalle}</div>
          <button class="btn-icon" style="font-size:13px" onclick="eliminarEjercicioRutina(${rutina_id}, ${e.ejercicio_id})">✕</button>
        </div>`;
    }).join("");
  }

  function abrirModalRutina() {
    document.getElementById("inp-rutina-nombre").value = "";
    document.getElementById("inp-rutina-desc").value = "";
    document.querySelectorAll("#modal-rutina .dia-btn").forEach(b => {
        b.classList.remove("selected");
        b.onclick = () => b.classList.toggle("selected");
    });
    document.getElementById("modal-rutina").classList.add("open");
}

  async function guardarRutina() {
    const nombre = document.getElementById("inp-rutina-nombre").value.trim();
    const desc = document.getElementById("inp-rutina-desc").value.trim();
    const diasSeleccionados = [...document.querySelectorAll("#modal-rutina .dia-btn.selected")]
        .map(b => b.dataset.dia);
    if (!nombre || diasSeleccionados.length === 0) return;
    await fetch("/api/ejercicios/rutinas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, dias_semana: diasSeleccionados, descripcion: desc || null })
    });
    cerrarModal("modal-rutina");
    cargarRutinas();
}

  async function eliminarRutina(id) {
    if (!confirm("¿Eliminar esta rutina?")) return;
    await fetch(`/api/ejercicios/rutinas/${id}`, { method: "DELETE" });
    cargarRutinas();
  }

  async function eliminarEjercicioRutina(rutina_id, ejercicio_id) {
    await fetch(`/api/ejercicios/rutinas/${rutina_id}/ejercicios/${ejercicio_id}`, { method: "DELETE" });
    cargarEjerciciosRutina(rutina_id);
  }

  function abrirModalEjercicioRutina(rutina_id) {
    document.getElementById("inp-rutina-id").value = rutina_id;
    const sel = document.getElementById("sel-ejercicio-rutina");
    sel.innerHTML = '<option value="__nuevo">+ Crear nuevo ejercicio</option>' +
      ejerciciosCat.map(e => `<option value="${e.id}">${e.nombre}</option>`).join("");
    sel.onchange = () => {
      const nuevo = sel.value === "__nuevo";
      document.getElementById("nuevo-ejercicio-fields").classList.toggle("hidden", !nuevo);
    };
    document.getElementById("nuevo-ejercicio-fields").classList.remove("hidden");
    tipoEjercicioSeleccionado = 'repeticiones';
    document.querySelectorAll(".tipo-btn").forEach(b => b.classList.toggle("selected", b.dataset.tipo === 'repeticiones'));
    document.getElementById("field-reps").classList.remove("hidden");
    document.getElementById("field-tiempo").classList.add("hidden");
    document.getElementById("modal-ejercicio-rutina").classList.add("open");
  }

  function selTipo(btn) {
    tipoEjercicioSeleccionado = btn.dataset.tipo;
    document.querySelectorAll(".tipo-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    const esTiempo = tipoEjercicioSeleccionado === 'tiempo';
    document.getElementById("field-reps").classList.toggle("hidden", esTiempo);
    document.getElementById("field-tiempo").classList.toggle("hidden", !esTiempo);
  }

  async function guardarEjercicioRutina() {
    const rutina_id = parseInt(document.getElementById("inp-rutina-id").value);
    const sel = document.getElementById("sel-ejercicio-rutina");
    const series = parseInt(document.getElementById("inp-ej-series").value) || null;
    const esTiempo = tipoEjercicioSeleccionado === 'tiempo';
    const reps_objetivo = esTiempo
      ? parseInt(document.getElementById("inp-ej-tiempo").value) || null
      : parseInt(document.getElementById("inp-ej-reps").value) || null;

    let ejercicio_id;

    if (sel.value === "__nuevo") {
      const nombre = document.getElementById("inp-ej-nombre").value.trim();
      if (!nombre) return;
      const res = await fetch("/api/ejercicios/catalogo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          nombre,
          grupo_muscular: document.getElementById("inp-ej-musculo").value.trim() || null,
          equipo_default: document.getElementById("inp-ej-equipo").value || null,
          tipo: tipoEjercicioSeleccionado
        })
      });
      const data = await res.json();
      ejercicio_id = data.id;
      await cargarEjercicios();
    } else {
      ejercicio_id = parseInt(sel.value);
    }

    await fetch(`/api/ejercicios/rutinas/${rutina_id}/ejercicios`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ejercicio_id, series, reps_objetivo })
    });

    cerrarModal("modal-ejercicio-rutina");
    cargarEjerciciosRutina(rutina_id);
  }

  // ── HOY ──────────────────────────────────────────────

  async function cargarRutinaHoy() {
    const res = await fetch(`/api/ejercicios/rutinas/${diaHoy}`);
    const container = document.getElementById("rutina-hoy");

    if (!res.ok) {
      container.innerHTML = `
        <div class="dia-card">
          <div style="text-align:center; padding: 20px; color: var(--text-dim)">
            <div style="font-size:32px; margin-bottom:12px">🌙</div>
            <div style="font-family:'Cinzel',serif; font-size:16px">Día de descanso</div>
            <div style="font-size:13px; margin-top:8px">No hay rutina asignada para hoy</div>
          </div>
          <div style="text-align:center;margin-top:16px">
            <button class="btn-secondary" onclick="abrirModalSesionLibre()">Iniciar sesión libre</button>
          </div>
        </div>`;
      return;
    }

    const data = await res.json();
    const ejercicios = data.ejercicios.map(e => `
      <div class="ejercicio-item">
        <div class="ejercicio-bullet"></div>
        <div class="ejercicio-nombre">${e.nombre}</div>
        <div class="ejercicio-series">${e.series ? e.series + " series" : ""} ${e.reps_objetivo ? "× " + e.reps_objetivo + (e.tipo === 'tiempo' ? 's' : ' reps') : ""}</div>
      </div>
    `).join("");

    container.innerHTML = `
      <div class="dia-card">
        <div class="dia-header">
          <div>
            <div class="dia-nombre">${data.rutina.nombre}</div>
            <div class="dia-tipo">${diaHoy}</div>
          </div>
          <button class="btn-primary" onclick="iniciarSesion(${data.rutina.id})">Iniciar sesión</button>
        </div>
        ${ejercicios || '<div style="color:var(--text-dim)">Sin ejercicios definidos</div>'}
      </div>`;
  }

  // ── SESIÓN ───────────────────────────────────────────

  function abrirModalSesionLibre() {
    const sel = document.getElementById("sel-rutina-sesion");
    sel.innerHTML = '<option value="">Sesión libre</option>' +
      rutinasCat.map(r => `<option value="${r.id}">${r.nombre} (${r.dia_semana})</option>`).join("");
    document.getElementById("modal-sesion-libre").classList.add("open");
  }

  async function confirmarIniciarSesion() {
    const rutina_id = document.getElementById("sel-rutina-sesion").value || null;
    cerrarModal("modal-sesion-libre");
    await iniciarSesion(rutina_id ? parseInt(rutina_id) : null);
  }

  async function iniciarSesion(rutina_id) {
    const res = await fetch("/api/ejercicios/sesiones", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ rutina_id: rutina_id || null })
    });
    const data = await res.json();
    sesionActiva = data.sesion_id;
    segundos = 0;
    timerInterval = setInterval(() => {
      segundos++;
      const m = Math.floor(segundos / 60).toString().padStart(2,"0");
      const s = (segundos % 60).toString().padStart(2,"0");
      const el = document.getElementById("timer");
      if (el) el.textContent = `${m}:${s}`;
    }, 1000);
    showTab("sesion");
  }

  // tarjetasSesion: array de { ejercicio_id, nombre, tipo, sets: [...] }
  // Se reconstruye cada vez que se cargan los sets, agrupando por ejercicio.
  let tarjetasSesion = [];
  // ids de ejercicios añadidos a la sesión pero sin ningun set aun
  // (para que la tarjeta aparezca vacia lista para rellenar)
  let ejerciciosVaciosSesion = [];

  function renderSesion() {
    const container = document.getElementById("sesion-container");
    if (!sesionActiva) {
      container.innerHTML = `
        <div class="no-sesion">
          <p>No hay sesión activa</p>
          <div class="btn-row" style="justify-content:center">
            <button class="btn-primary" onclick="showTab('hoy')">Ver rutina de hoy</button>
            <button class="btn-secondary" onclick="abrirModalSesionLibre()">Sesión libre</button>
          </div>
        </div>`;
      return;
    }

    container.innerHTML = `
      <div class="sesion-panel">
        <div class="sesion-header">
          <div class="sesion-title">Sesión activa</div>
          <div class="sesion-timer" id="timer">00:00</div>
        </div>
        <div id="tarjetas-ejercicios"></div>
        <button class="btn-add" onclick="abrirSelectorEjercicioSesion()">+ Añadir ejercicio</button>
        <div class="btn-row" style="margin-top:16px">
          <button class="btn-danger" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
      </div>`;

    cargarSets();
  }

  function abrirSelectorEjercicioSesion() {
    const yaAnadidos = new Set(tarjetasSesion.map(t => t.ejercicio_id));
    const disponibles = ejerciciosCat.filter(e => !yaAnadidos.has(e.id));
    if (disponibles.length === 0) {
      alert("Ya has añadido todos los ejercicios del catálogo a esta sesión.");
      return;
    }
    const nombre = prompt(
      "Ejercicio a añadir:\n" + disponibles.map(e => e.nombre).join(", ")
    );
    if (!nombre) return;
    const ej = disponibles.find(e => e.nombre.toLowerCase() === nombre.trim().toLowerCase());
    if (!ej) {
      alert("No se ha encontrado ese ejercicio exacto en el catálogo.");
      return;
    }
    if (!ejerciciosVaciosSesion.includes(ej.id)) ejerciciosVaciosSesion.push(ej.id);
    renderTarjetasEjercicios();
  }

  function togglePesoSesion(sel, ejercicioId) {
    const sinPeso = sel.value === "Peso corporal" || sel.value === "";
    const campo = document.getElementById(`campo-peso-${ejercicioId}`);
    if (campo) campo.classList.toggle("hidden", sinPeso);
  }

  async function cargarSets() {
    const res = await fetch(`/api/ejercicios/sesiones/${sesionActiva}/sets`);
    const sets = await res.json();

    // Agrupamos los sets ya guardados por ejercicio, conservando el orden
    // en que aparecieron por primera vez en la sesión.
    const porEjercicio = new Map();
    sets.forEach(s => {
      if (!porEjercicio.has(s.ejercicio_id)) {
        const cat = ejerciciosCat.find(e => e.id === s.ejercicio_id);
        porEjercicio.set(s.ejercicio_id, {
          ejercicio_id: s.ejercicio_id,
          nombre: s.nombre,
          tipo: cat ? cat.tipo : 'repeticiones',
          sets: []
        });
      }
      porEjercicio.get(s.ejercicio_id).sets.push(s);
    });

    // Añadimos las tarjetas "vacias" (ejercicios elegidos pero sin sets aun)
    ejerciciosVaciosSesion.forEach(id => {
      if (!porEjercicio.has(id)) {
        const cat = ejerciciosCat.find(e => e.id === id);
        if (cat) {
          porEjercicio.set(id, { ejercicio_id: id, nombre: cat.nombre, tipo: cat.tipo, sets: [] });
        }
      }
    });

    tarjetasSesion = [...porEjercicio.values()];
    renderTarjetasEjercicios();
  }

  function renderTarjetasEjercicios() {
    const cont = document.getElementById("tarjetas-ejercicios");
    if (!cont) return;

    if (tarjetasSesion.length === 0) {
      cont.innerHTML = '<div style="color:var(--text-dim);font-size:14px;margin-bottom:16px">Aún no has añadido ningún ejercicio a esta sesión.</div>';
      return;
    }

    cont.innerHTML = tarjetasSesion.map(t => {
      const esTiempo = t.tipo === 'tiempo';
      const ultimoSet = t.sets[t.sets.length - 1];
      const siguienteSerie = t.sets.length + 1;
      const repsSugeridas = ultimoSet ? (ultimoSet.reps || 10) : 10;
      const tiempoSugerido = ultimoSet ? (ultimoSet.duracion_seg || 30) : 30;
      const pesoSugerido = ultimoSet && ultimoSet.peso_kg ? ultimoSet.peso_kg : '';
      const equipoSugerido = ultimoSet && ultimoSet.equipo ? ultimoSet.equipo : 'Peso corporal';
      const sinPesoInicial = equipoSugerido === 'Peso corporal';

      const filasSets = t.sets.map((s, i) => {
        let detalle = s.duracion_seg ? `${s.duracion_seg}s` : `${s.reps} reps`;
        if (s.peso_kg) detalle += ` · ${s.peso_kg}kg`;
        if (s.equipo) detalle += ` · ${s.equipo}`;
        return `
          <div class="set-row">
            <div class="set-num">${i + 1}</div>
            <div class="set-detalle" style="flex:1">${detalle}</div>
          </div>`;
      }).join("");

      return `
        <div class="dia-card" style="margin-bottom:12px">
          <div class="dia-header" style="margin-bottom:12px">
            <div class="dia-nombre" style="font-size:16px">${t.nombre}</div>
          </div>
          <div class="sets-list">${filasSets || '<div style="color:var(--text-dim);font-size:13px;margin-bottom:8px">Sin series aún</div>'}</div>
          <div class="add-set-form">
            <div>
              <label class="form-label">Serie</label>
              <input class="form-input" id="serie-${t.ejercicio_id}" type="number" min="1" value="${siguienteSerie}">
            </div>
            <div id="campo-reps-${t.ejercicio_id}" class="${esTiempo ? 'hidden' : ''}">
              <label class="form-label">Reps</label>
              <input class="form-input" id="reps-${t.ejercicio_id}" type="number" min="1" value="${repsSugeridas}">
            </div>
            <div id="campo-tiempo-${t.ejercicio_id}" class="${esTiempo ? '' : 'hidden'}">
              <label class="form-label">Segundos</label>
              <input class="form-input" id="tiempo-${t.ejercicio_id}" type="number" min="1" value="${tiempoSugerido}">
            </div>
            <div id="campo-peso-${t.ejercicio_id}" class="${(esTiempo || sinPesoInicial) ? 'hidden' : ''}">
              <label class="form-label">Peso (kg)</label>
              <input class="form-input" id="peso-${t.ejercicio_id}" type="number" min="0" value="${pesoSugerido}">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Equipo</label>
            <select class="form-select" id="equipo-${t.ejercicio_id}" onchange="togglePesoSesion(this, ${t.ejercicio_id})">
              ${["Peso corporal","Mancuernas","Barra","Maquina","Bandas"].map(eq =>
                `<option value="${eq}" ${eq === equipoSugerido ? 'selected' : ''}>${eq === 'Maquina' ? 'Máquina' : eq}</option>`
              ).join("")}
            </select>
          </div>
          <button class="btn-primary" style="width:100%;margin-top:8px" onclick="addSet(${t.ejercicio_id})">+ Añadir serie</button>
        </div>`;
    }).join("");
  }

  async function addSet(ejercicioId) {
    const btn = event.target;
    btn.disabled = true;

    const tarjeta = tarjetasSesion.find(t => t.ejercicio_id === ejercicioId);
    const esTiempo = tarjeta.tipo === 'tiempo';
    const serie_num = parseInt(document.getElementById(`serie-${ejercicioId}`).value);
    const reps = esTiempo ? null : parseInt(document.getElementById(`reps-${ejercicioId}`).value);
    const duracion_seg = esTiempo ? parseInt(document.getElementById(`tiempo-${ejercicioId}`).value) : null;
    const equipo = document.getElementById(`equipo-${ejercicioId}`).value;
    const pesoInput = document.getElementById(`peso-${ejercicioId}`);
    const peso = (esTiempo || equipo === "Peso corporal") ? null : (parseFloat(pesoInput.value) || null);

    await fetch(`/api/ejercicios/sesiones/${sesionActiva}/sets`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ejercicio_id: ejercicioId, serie_num, reps, peso_kg: peso, equipo, duracion_seg })
    });

    await fetch("/api/usuario/xp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ stat_tipo: "Fuerza", xp: 10, motivo: "Set completado" })
    });

    await cargarSets();
  }

  async function cerrarSesion() {
    clearInterval(timerInterval);
    const duracion = Math.floor(segundos / 60) || 1;
    await fetch(`/api/ejercicios/sesiones/${sesionActiva}/cerrar`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ duracion_min: duracion })
    });
    await fetch("/api/usuario/xp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ stat_tipo: "Fuerza", xp: 50, motivo: "Sesion completada" })
    });
    sesionActiva = null;
    showTab("historial");
  }

  async function cargarHistorial() {
    const res = await fetch("/api/ejercicios/sesiones");
    const sesiones = await res.json();
    const list = document.getElementById("historial-list");
    if (sesiones.length === 0) {
      list.innerHTML = '<div style="color:var(--text-dim);font-size:14px">Sin sesiones registradas aún</div>';
      return;
    }
    list.innerHTML = sesiones.map(s => `
      <div class="historial-item">
        <div>
          <div class="historial-fecha">${s.fecha}</div>
          <div class="historial-rutina">Sesión #${s.id}</div>
        </div>
        <div class="historial-duracion">${s.duracion_min ? s.duracion_min + " min" : "—"}</div>
      </div>`).join("");
  }

  async function cargarEjercicios() {
    const res = await fetch("/api/ejercicios/catalogo");
    ejerciciosCat = await res.json();
  }

  // Inicializar
  async function init() {
    await cargarEjercicios();
    await cargarRutinas();
    cargarRutinaHoy();
  }

  init();
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js");
  }
</script>
</body>
</html>
